<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operations Hub Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Public Sans", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #f4efe7 0%, #d9e4dd 100%);
        color: #132a1f;
      }

      .login-shell {
        width: min(100%, 30rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255, 252, 247, 0.94);
        box-shadow: 0 1rem 3rem rgba(19, 42, 31, 0.14);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
      }

      p {
        margin: 0 0 1.25rem;
        line-height: 1.5;
      }

      .field {
        margin-bottom: 1rem;
      }

      .field label {
        display: block;
        margin-bottom: 0.45rem;
        font-weight: 700;
      }

      .field input[type="text"],
      .field input[type="password"] {
        width: 100%;
        padding: 0.85rem 1rem;
        border: 1px solid #b9c7bd;
        border-radius: 0.9rem;
        font: inherit;
        background: #fff;
      }

      .error {
        margin-bottom: 1rem;
        color: #8f1d1d;
        font-weight: 600;
      }

      .success {
        margin-bottom: 1rem;
        color: #1f5145;
        font-weight: 600;
      }

      button {
        margin-top: 0.75rem;
        border: 0;
        border-radius: 999px;
        padding: 0.85rem 1.2rem;
        background: #173927;
        color: #fff;
        font: inherit;
        cursor: pointer;
      }

      .secondary-link {
        display: inline-block;
        margin-top: 1rem;
        color: #173927;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <p>Operations Hub</p>
      <h1>Sign in</h1>
      <p>Enter your username and password to open the dashboard for your stored role.</p>
      {% if request.args.get("signup") == "success" %}
      <p class="success">Account created. Sign in with your new credentials.</p>
      {% endif %}
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/login">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" value="{{ selected_username or request.args.get('username', '') }}" placeholder="Enter your username" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter your password" />
        </div>
        <button type="submit">Continue</button>
      </form>
      <a class="secondary-link" href="/signup">Create an account</a>
    </main>
  </body>
</html>
