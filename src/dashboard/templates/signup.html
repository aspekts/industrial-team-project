<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operations Hub Sign Up</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Public Sans", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #f4efe7 0%, #d9e4dd 100%);
        color: #132a1f;
      }

      .signup-shell {
        width: min(100%, 32rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255, 252, 247, 0.94);
        box-shadow: 0 1rem 3rem rgba(19, 42, 31, 0.14);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
      }

      p {
        margin: 0 0 1.25rem;
        line-height: 1.5;
      }

      .field {
        margin-bottom: 1rem;
      }

      .field label {
        display: block;
        margin-bottom: 0.45rem;
        font-weight: 700;
      }

      .field input[type="text"],
      .field input[type="password"] {
        width: 100%;
        padding: 0.85rem 1rem;
        border: 1px solid #b9c7bd;
        border-radius: 0.9rem;
        font: inherit;
        background: #fff;
      }

      fieldset {
        margin: 0;
        padding: 0;
        border: 0;
      }

      .legend-label {
        display: block;
        margin-bottom: 0.65rem;
        font-weight: 700;
      }

      .role-option {
        display: flex;
        gap: 0.75rem;
        align-items: flex-start;
        margin-bottom: 0.75rem;
        padding: 0.9rem 1rem;
        border: 1px solid #b9c7bd;
        border-radius: 1rem;
        background: #fff;
      }

      .role-option strong,
      .role-option span {
        display: block;
      }

      .error {
        margin-bottom: 1rem;
        color: #8f1d1d;
        font-weight: 600;
      }

      button {
        margin-top: 0.75rem;
        border: 0;
        border-radius: 999px;
        padding: 0.85rem 1.2rem;
        background: #173927;
        color: #fff;
        font: inherit;
        cursor: pointer;
      }

      .secondary-link {
        display: inline-block;
        margin-top: 1rem;
        color: #173927;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="signup-shell">
      <p>Operations Hub</p>
      <h1>Create account</h1>
      <p>Choose a username, set a password, and assign the dashboard role for this account.</p>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/signup">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" value="{{ selected_username }}" placeholder="Choose a username" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Create a password" />
        </div>
        <div class="field">
          <label for="confirm_password">Confirm password</label>
          <input id="confirm_password" name="confirm_password" type="password" placeholder="Re-enter your password" />
        </div>

        <fieldset>
          <legend class="legend-label">Role</legend>
          <label class="role-option">
            <input type="radio" name="role" value="admin" {% if selected_role == "admin" %}checked{% endif %} />
            <span>
              <strong>Admin</strong>
              <span>Platform-wide access and configuration oversight.</span>
            </span>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="manager" {% if selected_role == "manager" %}checked{% endif %} />
            <span>
              <strong>Manager</strong>
              <span>Operational review and summary-level monitoring.</span>
            </span>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="ops" {% if selected_role == "ops" %}checked{% endif %} />
            <span>
              <strong>Ops</strong>
              <span>Daily anomaly handling and frontline investigation.</span>
            </span>
          </label>
        </fieldset>
        <button type="submit">Create account</button>
      </form>
      <a class="secondary-link" href="/login">Back to login</a>
    </main>
  </body>
</html>
