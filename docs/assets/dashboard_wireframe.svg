  <rect class="panel" x="416" y="532" width="528" height="188" rx="18"/>
  <text class="txt-h2" x="440" y="560">Priority Item / Next Best Action</text>
  <rect class="mid" x="440" y="580" width="480" height="22" rx="8"/>
  <rect class="mid" x="440" y="612" width="430" height="18" rx="8"/>
  <rect class="mid" x="440" y="640" width="448" height="18" rx="8"/>
  <rect class="mid" x="440" y="668" width="390" height="18" rx="8"/>
  <rect class="panel" x="440" y="690" width="150" height="22" rx="8"/>
  <rect class="panel" x="602" y="690" width="174" height="22" rx="8"/>

  <rect class="panel" x="964" y="532" width="548" height="188" rx="18"/>
  <text class="txt-h2" x="988" y="560">Trend and Host Pressure</text>
  <path class="line" d="M992 670 C1060 654, 1122 642, 1180 624 S1286 580, 1368 602 S1452 626, 1482 594"/>
  <line class="thin" x1="992" y1="682" x2="1480" y2="682"/>
  <line class="thin" x1="992" y1="642" x2="1480" y2="642"/>
  <line class="thin" x1="992" y1="602" x2="1480" y2="602"/>
  <rect class="soft" x="1196" y="574" width="270" height="92" rx="14"/>
