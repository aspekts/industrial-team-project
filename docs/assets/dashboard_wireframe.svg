  <path class="line" d="M1216 646 C1264 620, 1300 618, 1342 628 S1408 642, 1450 610"/>

  <rect class="panel" x="416" y="742" width="352" height="124" rx="18"/>
  <text class="txt-h2" x="440" y="770">Source-Backed Checks</text>
  <rect class="mid" x="440" y="790" width="300" height="14" rx="7"/>
  <rect class="mid" x="440" y="816" width="286" height="14" rx="7"/>
  <rect class="mid" x="440" y="842" width="270" height="14" rx="7"/>

  <rect class="panel" x="790" y="742" width="352" height="124" rx="18"/>
  <text class="txt-h2" x="814" y="770">ATM Fleet Snapshot</text>
  <rect class="mid" x="814" y="792" width="300" height="16" rx="8"/>
  <rect class="mid" x="814" y="818" width="300" height="16" rx="8"/>
  <rect class="mid" x="814" y="844" width="300" height="16" rx="8"/>

  <rect class="panel" x="1164" y="742" width="348" height="124" rx="18"/>
  <text class="txt-h2" x="1188" y="770">Incidents and Recommendations</text>
  <rect class="mid" x="1188" y="792" width="296" height="16" rx="8"/>
  <rect class="mid" x="1188" y="818" width="280" height="16" rx="8"/>
  <rect class="mid" x="1188" y="844" width="252" height="16" rx="8"/>

  <path class="thin" d="M416 900 H1512"/>
  <text class="txt-small" x="420" y="930">This wireframe represents the report view of the main dashboard screen.</text>
  <text class="txt-small" x="420" y="950">Related product screens in the implemented app: ATM Detail, ATM List, Alerts, Action Center, Data Flow, and Settings.</text>

  <rect class="soft" x="1238" y="880" width="274" height="52" rx="12"/>
  <text class="txt-small" x="1254" y="903">Suggested caption:</text>
  <text class="txt-small" x="1254" y="923">Figure X. Early wireframe of the ATM operations dashboard.</text>
</svg>
