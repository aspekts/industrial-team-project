<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">ATM operations dashboard wireframe</title>
  <desc id="desc">Report-ready grayscale wireframe of the ATM operations dashboard showing the sidebar, dashboard header, priority banner, metric cards, trend panel, source checks, ATM list, alerts, actions, and data flow areas.</desc>

  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .shell { fill: #ffffff; stroke: #232323; stroke-width: 2; }
      .panel { fill: #ffffff; stroke: #444444; stroke-width: 1.5; }
      .soft { fill: #fafafa; stroke: #737373; stroke-width: 1.25; stroke-dasharray: 8 6; }
      .dark { fill: #e6e6e6; stroke: #232323; stroke-width: 1.5; }
      .mid { fill: #efefef; stroke: #555555; stroke-width: 1.25; }
      .line { stroke: #565656; stroke-width: 1.5; fill: none; }
      .thin { stroke: #8a8a8a; stroke-width: 1; fill: none; }
      .txt-title { font: 700 28px Arial, Helvetica, sans-serif; fill: #111111; }
      .txt-h1 { font: 700 22px Arial, Helvetica, sans-serif; fill: #111111; }
      .txt-h2 { font: 700 17px Arial, Helvetica, sans-serif; fill: #111111; }
      .txt-body { font: 400 14px Arial, Helvetica, sans-serif; fill: #2a2a2a; }
      .txt-small { font: 400 12px Arial, Helvetica, sans-serif; fill: #4a4a4a; }
      .txt-label { font: 700 11px Arial, Helvetica, sans-serif; fill: #5a5a5a; letter-spacing: 1px; }
      .pill { fill: #e0e0e0; stroke: #4a4a4a; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>
  <text class="txt-title" x="64" y="58">ATM Operations Dashboard Wireframe</text>
  <text class="txt-body" x="64" y="86">Mock UI for report use based on the current role-based Flask dashboard structure.</text>

  <rect class="shell" x="60" y="120" width="1480" height="790" rx="24"/>

  <rect class="dark" x="84" y="144" width="300" height="742" rx="20"/>
  <text class="txt-label" x="112" y="182">SIDEBAR</text>
  <text class="txt-h1" x="112" y="216">Operations Hub</text>
  <text class="txt-small" x="112" y="238">Source-backed ATM telemetry and anomaly monitoring</text>

  <rect class="panel" x="112" y="262" width="244" height="42" rx="10"/>
  <text class="txt-body" x="128" y="289">Search ATMs, anomalies, sources</text>

  <rect class="panel" x="112" y="326" width="244" height="92" rx="14"/>
  <text class="txt-h2" x="128" y="350">Source Key</text>
  <text class="txt-small" x="128" y="374">ATMA  ATM app logs</text>
  <text class="txt-small" x="128" y="392">ATMH  Hardware alerts</text>
  <text class="txt-small" x="248" y="374">KAFK  Stream health</text>
  <text class="txt-small" x="248" y="392">WINOS Host metrics</text>

  <rect class="panel" x="112" y="438" width="244" height="108" rx="14"/>
  <text class="txt-h2" x="128" y="462">Date Filter</text>
  <rect class="mid" x="128" y="478" width="212" height="30" rx="8"/>
  <rect class="mid" x="128" y="518" width="130" height="20" rx="8"/>
  <rect class="mid" x="270" y="518" width="70" height="20" rx="8"/>

  <rect class="panel" x="112" y="566" width="244" height="86" rx="14"/>
  <text class="txt-h2" x="128" y="590">Display Size</text>
  <rect class="mid" x="128" y="606" width="212" height="28" rx="10"/>

  <rect class="panel" x="112" y="672" width="244" height="96" rx="14"/>
  <text class="txt-h2" x="128" y="696">Data Footprint</text>
  <text class="txt-small" x="128" y="720">Sources      7</text>
  <text class="txt-small" x="128" y="738">ATMs         6</text>
  <text class="txt-small" x="128" y="756">Avg TPS      2.8</text>

