  <rect class="panel" x="1306" y="264" width="174" height="34" rx="10"/>
  <text class="txt-small" x="1352" y="286">VIEW ALERTS</text>

  <text class="txt-label" x="418" y="352">TOP METRICS</text>
  <rect class="panel" x="416" y="364" width="256" height="124" rx="18"/>
  <rect class="panel" x="694" y="364" width="256" height="124" rx="18"/>
  <rect class="panel" x="972" y="364" width="256" height="124" rx="18"/>
  <rect class="panel" x="1250" y="364" width="262" height="124" rx="18"/>
  <text class="txt-h2" x="438" y="394">Observed ATMs</text>
  <text class="txt-h2" x="716" y="394">ATM App Errors</text>
  <text class="txt-h2" x="994" y="394">Hardware Alerts</text>
  <text class="txt-h2" x="1272" y="394">Event Throughput</text>
  <rect class="mid" x="438" y="410" width="72" height="42" rx="10"/>
  <rect class="mid" x="716" y="410" width="72" height="42" rx="10"/>
  <rect class="mid" x="994" y="410" width="72" height="42" rx="10"/>
  <rect class="mid" x="1272" y="410" width="72" height="42" rx="10"/>
  <text class="txt-small" x="438" y="472">Click-through metric card</text>
  <text class="txt-small" x="716" y="472">Click-through metric card</text>
  <text class="txt-small" x="994" y="472">Click-through metric card</text>
  <text class="txt-small" x="1272" y="472">Click-through metric card</text>

